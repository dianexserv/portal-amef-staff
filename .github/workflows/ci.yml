name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint + Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres service container — folosit de integration tests pentru a
    # valida runner-ul de migrații end-to-end. Versiunea trebuie să rămână
    # aliniată cu Cloud SQL (CLAUDE.md → PostgreSQL 18).
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_amef
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test_amef"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Run unit tests
        run: pnpm -r test:run

      - name: Run integration tests (against postgres service)
        env:
          TEST_DB_CONNECTION_STRING: postgresql://test:test@localhost:5432/test_amef
        run: pnpm --filter @portal-amef-staff/server test:integration

      - name: Run coverage (enforces thresholds from vitest.config.js)
        env:
          TEST_DB_CONNECTION_STRING: postgresql://test:test@localhost:5432/test_amef
        run: pnpm -r test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            server/coverage/
            frontend/coverage/
          retention-days: 14
